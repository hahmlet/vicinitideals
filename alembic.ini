# Alembic configuration file

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration file names.
file_template = %%(rev)s_%%(slug)s

# Timezone to use when rendering the date within the migration file.
timezone = UTC

# Max length of characters to apply to the "slug" field.
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command.
revision_environment = false

# Set to 'true' to allow .pyc files to be run as migration scripts.
sourceless = false

# Version path separator.
version_path_separator = os

# The output encoding used when revision files are written from script.mako.
output_encoding = utf-8

# Async DSN — overridden by env.py using settings.database_url
sqlalchemy.url = postgresql+asyncpg://re_modeling:changeme@postgres:5432/re_modeling

[post_write_hooks]
# No post-write hooks configured

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
