<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }} — Viciniti Deals</title>
  <link rel="stylesheet" href="/static/app.css">
  <style>
    body { justify-content: center; align-items: center; background: var(--bg); }
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      padding: 40px 36px;
      width: 100%;
      max-width: 440px;
      text-align: center;
    }
    .auth-brand { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 24px; }
    .auth-brand span { color: var(--accent); }
    .auth-icon {
      width: 56px; height: 56px; border-radius: 50%; margin: 0 auto 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }
    .auth-icon.success { background: #ecfdf5; color: #065f46; }
    .auth-icon.error { background: var(--danger-light); color: var(--danger); }
    .auth-title { font-size: 20px; font-weight: 700; margin-bottom: 10px; color: var(--text); }
    .auth-message { font-size: 14px; color: var(--text-muted); line-height: 1.55; margin-bottom: 22px; }
    .auth-actions { display: flex; flex-direction: column; gap: 10px; }
    .auth-footer { margin-top: 18px; font-size: 13px; color: var(--text-muted); }
    .auth-footer a { color: var(--accent); text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-brand">Viciniti <span>Deals</span></div>
    <div class="auth-icon {{ 'success' if success else 'error' }}">
      {{ '✓' if success else '✕' }}
    </div>
    <div class="auth-title">{{ title }}</div>
    <div class="auth-message">{{ message }}</div>
    <div class="auth-actions">
      {% if next_url %}
      <a href="{{ next_url }}" class="btn btn-primary">{{ next_label or 'Continue' }}</a>
      {% endif %}
      <a href="/login" class="auth-footer">Back to sign in</a>
    </div>
  </div>
</body>
</html>
