<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Viciniti Deals</title>
  <link rel="stylesheet" href="/static/app.css">
  <style>
    body { justify-content: center; align-items: center; background: var(--bg); }
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
    }
    .auth-brand {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 24px;
      text-align: center;
    }
    .auth-brand span { color: var(--accent); }
    .auth-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; text-align: center; }
    .auth-form { display: flex; flex-direction: column; gap: 14px; }
    .auth-form label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
    .auth-form input { width: 100%; }
    .auth-error {
      background: var(--danger-light);
      border: 1px solid #fca5a5;
      border-radius: var(--radius-sm);
      color: var(--danger);
      font-size: 13px;
      padding: 10px 12px;
    }
    .auth-footer { margin-top: 18px; text-align: center; font-size: 13px; color: var(--text-muted); }
    .auth-footer a { color: var(--accent); text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-brand">Viciniti <span>Deals</span></div>
    <div class="auth-title">Sign in</div>

    {% if error %}
    <div class="auth-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login?next={{ next | urlencode }}" class="auth-form">
      <div>
        <label for="email">Email</label>
        <input class="filter-input" type="email" id="email" name="email"
               placeholder="you@example.com" required autofocus>
      </div>
      <div>
        <label for="password">Password</label>
        <input class="filter-input" type="password" id="password" name="password"
               placeholder="••••••••" required>
      </div>
      <button class="btn btn-primary" type="submit" style="margin-top:4px">Sign in</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="/register">Create one</a>
    </div>
  </div>
</body>
</html>
