<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset password — Viciniti Deals</title>
  <link rel="stylesheet" href="/static/app.css">
  <style>
    body { justify-content: center; align-items: center; background: var(--bg); }
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
    }
    .auth-brand { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 24px; text-align: center; }
    .auth-brand span { color: var(--accent); }
    .auth-title { font-size: 20px; font-weight: 700; margin-bottom: 10px; text-align: center; }
    .auth-sub { font-size: 13px; color: var(--text-muted); text-align: center; margin-bottom: 20px; line-height: 1.5; }
    .auth-form { display: flex; flex-direction: column; gap: 14px; }
    .auth-form label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
    .auth-form input { width: 100%; }
    .auth-error {
      background: var(--danger-light);
      border: 1px solid #fca5a5;
      border-radius: var(--radius-sm);
      color: var(--danger);
      font-size: 13px;
      padding: 10px 12px;
    }
    .auth-footer { margin-top: 18px; text-align: center; font-size: 13px; color: var(--text-muted); }
    .auth-footer a { color: var(--accent); text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-brand">Viciniti <span>Deals</span></div>
    <div class="auth-title">Set a new password</div>
    <div class="auth-sub">
      Choose a strong password — at least 8 characters. You'll be signed
      in automatically once it's saved.
    </div>

    {% if error %}
    <div class="auth-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/reset-password" class="auth-form">
      <input type="hidden" name="token" value="{{ token }}">
      <div>
        <label for="password">New password</label>
        <input class="filter-input" type="password" id="password" name="password"
               placeholder="••••••••" minlength="8" required autofocus>
      </div>
      <div>
        <label for="password_confirm">Confirm password</label>
        <input class="filter-input" type="password" id="password_confirm" name="password_confirm"
               placeholder="••••••••" minlength="8" required>
      </div>
      <button class="btn btn-primary" type="submit" style="margin-top:4px">Reset password</button>
    </form>

    <div class="auth-footer">
      <a href="/login">← Back to sign in</a>
    </div>
  </div>
</body>
</html>
